name: pre-commit
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
    - features/**
    - feature/**
  pull_request:
    branches:
    - main
    - master
    - feature/**

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.14'  # matches what .pre-commit-config.yaml has
    - uses: pre-commit/action@v3.0.1
